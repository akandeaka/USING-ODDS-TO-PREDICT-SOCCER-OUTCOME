version: "3.9"

services:
  portal:
    build: .
    container_name: prediction_portal
    ports:
      - "8501:8501"
    command: streamlit run portal/app.py --server.port=8501 --server.address=0.0.0.0
    volumes:
      - .:/app

  api:
    build: .
    container_name: prediction_api
    ports:
      - "8000:8000"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app

  scheduler:
  build: .
  container_name: prediction_scheduler
  command: python -m engine.scheduler
  volumes:
    - .:/app

