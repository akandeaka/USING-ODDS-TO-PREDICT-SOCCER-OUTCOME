name: Run Soccer Prediction Scheduler

on:
  schedule:
    - cron: "0 9 * * *"   # every day at 09:00 UTC
    - cron: "0 23 * * *"  # every day at 23:00 UTC
  workflow_dispatch:       # allow manual trigger

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scheduler
        run: |
          python engine/scheduler.py

      - name: Commit updated log
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add performance_log.csv
          git commit -m "Update performance log [skip ci]" || echo "No changes to commit"
          git push
